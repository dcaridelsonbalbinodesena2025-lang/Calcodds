<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora HT Pro</title>
    <style>
        body { font-family: sans-serif; background-color: #222; color: white; display: flex; justify-content: center; padding: 10px; margin: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 360px; background: #222; }
        
        /* Visor Superior */
        #status-box { border: 4px solid #3d0505; background: #1a1a1a; padding: 10px; text-align: center; margin-bottom: 10px; min-height: 100px; }
        .msg-principal { color: #00ff88; font-size: 20px; font-weight: bold; display: block; margin-bottom: 5px; }
        .msg-secundaria { color: #ff3333; font-size: 16px; font-weight: bold; text-transform: uppercase; }

        .visor-black { background: #000; border: 1px solid #444; padding: 10px; text-align: center; margin-bottom: 10px; }
        .visor-label { font-size: 12px; color: #aaa; }
        .visor-value { font-size: 30px; color: #00ff88; font-weight: bold; }

        /* Slots de Preenchimento */
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .slot { flex: 1; background: #333; border: 1px solid #555; padding: 10px; text-align: center; cursor: pointer; }
        .slot.active { border: 2px solid #ffcc00; background: #444; }
        .slot-label { font-size: 12px; display: block; margin-bottom: 5px; font-weight: bold; }
        .slot-val { font-size: 22px; font-weight: bold; color: #00ff88; }

        /* Estilo para edição da Meta */
        .slot.editing { border: 2px solid #ffcc00 !important; background: #555 !important; }

        /* Teclado */
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .key { background: white; color: black; border: 1px solid #999; padding: 15px 0; font-size: 24px; font-weight: bold; border-radius: 4px; text-align: center; cursor: pointer; border-bottom: 4px solid #666; }
        .key:active { background: #ccc; border-bottom: 1px solid #666; transform: translateY(2px); }

        /* Botões de Ação */
        .btn-limpar { background: #ff0000; color: white; border: none; font-weight: bold; padding: 10px; font-size: 16px; width: 100%; cursor: pointer; margin-bottom: 5px; }
        .footer-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-add { background: #006600; color: white; border: none; padding: 15px; font-weight: bold; font-size: 18px; border-radius: 5px; }
        .btn-his { background: #ffcc00; color: black; border: none; padding: 15px; font-weight: bold; font-size: 18px; border-radius: 5px; }

        /* Histórico Modal */
        #modal-historico { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; z-index: 100; }
        .hist-item { background: #333; margin: 10px; padding: 10px; border-radius: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ffcc00; }
        .btn-green { background: #008800; color: white; border: none; padding: 5px 10px; margin: 2px; }
        .btn-red { background: #880000; color: white; border: none; padding: 5px 10px; margin: 2px; }

        /* Novo Modal de Estatísticas */
        #modal-stats { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; overflow-y: auto; z-index: 110; padding-bottom: 30px; }
        .stats-card { background: #2a2a2a; margin: 10px; padding: 15px; border-radius: 8px; border-bottom: 3px solid #00ff88; }
        .stats-header { font-size: 16px; color: #ffcc00; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
        .perc-green { color: #00ff88; font-weight: bold; }
        .perc-red { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body onload="carregarHistorico()">

<div class="container">
    <div id="status-box">
        <span class="msg-principal" id="st-msg">AGUARDANDO DADOS</span>
        <div class="msg-secundaria" id="st-desc">Insira as odds para analisar</div>
    </div>

    <div class="visor-black">
        <div class="visor-label">PROBABILIDADE REAL DO MERCADO</div>
        <div class="visor-value" id="prob-real">0.00%</div>
    </div>

    <div class="row">
        <div class="slot active" onclick="setFocus('over')" id="slot-over">
            <span class="slot-label">0.5 Over Ht</span>
            <span class="slot-val" id="val-over">---</span>
        </div>
        <div class="slot" onclick="setFocus('under')" id="slot-under">
            <span class="slot-label">0.5 Under Ht</span>
            <span class="slot-val" id="val-under">---</span>
        </div>
    </div>

    <div class="row" style="align-items: center;">
        <div class="slot" onclick="setFocus('meta')" ondblclick="enableMetaEdit()" id="slot-meta" style="flex: 2;">
            <span class="slot-label">Sua Análise Estatística %</span>
            <span class="slot-val" id="val-meta">70</span>
        </div>
        <button class="btn-limpar" onclick="limpar()" style="flex: 1; height: 60px;">LIMPAR DADOS</button>
    </div>

    <div class="keyboard">
        <div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
    </div>

    <div class="footer-btns">
        <button class="btn-add" onclick="adicionar()">Adicionar</button>
        <button class="btn-his" onclick="toggleHistorico(true)">Histórico</button>
    </div>
</div>

<div id="modal-historico">
    <h2 style="text-align:center; color:#ffcc00;">HISTÓRICO</h2>
    
    <!-- Botão de Analisar Odds Adicionado aqui -->
    <button onclick="gerarEstatisticas()" style="display:block; width:90%; margin: 0 auto 15px; padding: 15px; background: #006600; color: white; border: none; font-weight: bold; border-radius: 5px; font-size: 16px;">📊 ANALISAR ASSERTIVIDADE</button>

    <div id="lista-historico"></div>
    <button onclick="toggleHistorico(false)" style="display:block; width:80%; margin: 20px auto; padding: 15px; background: white; border: none; font-weight: bold;">VOLTAR</button>
    <button onclick="apagarTudo()" style="display:block; width:80%; margin: 10px auto; padding: 10px; background: #880000; color: white; border: none; border-radius: 5px;">APAGAR TODO HISTÓRICO</button>
</div>

<!-- Modal de Estatísticas (Nova Página) -->
<div id="modal-stats">
    <h2 style="text-align:center; color:#00ff88; margin-top: 20px;">ASSERTIVIDADE POR ODD</h2>
    <div id="lista-stats"></div>
    <button onclick="document.getElementById('modal-stats').style.display='none'" style="display:block; width:80%; margin: 20px auto; padding: 15px; background: #ffcc00; color: black; border: none; font-weight: bold; border-radius: 5px;">FECHAR ANÁLISE</button>
</div>

<script>
    let currentFocus = 'over';
    let data = { over: '', under: '', meta: '70' };
    let historico = [];
    let isEditingMeta = false;

    function carregarHistorico() {
        const salvo = localStorage.getItem('historico_ht_pro');
        if (salvo) {
            historico = JSON.parse(salvo);
        }
    }

    function salvarHistorico() {
        localStorage.setItem('historico_ht_pro', JSON.stringify(historico));
    }

    function apagarTudo() {
        if(confirm("Deseja apagar permanentemente todo o histórico?")) {
            historico = [];
            salvarHistorico();
            toggleHistorico(true);
        }
    }

    function setFocus(id) {
        if(isEditingMeta && id !== 'meta') disableMetaEdit();
        currentFocus = id;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('slot-' + id).classList.add('active');
    }

    function enableMetaEdit() {
        isEditingMeta = true;
        setFocus('meta');
        document.getElementById('slot-meta').classList.add('editing');
    }

    function disableMetaEdit() {
        isEditingMeta = false;
        document.getElementById('slot-meta').classList.remove('editing');
    }

    function press(num) {
        if (currentFocus === 'meta') {
            if (data.meta.length >= 2) data.meta = ''; 
            data.meta += num;
            if (data.meta.length === 2) {
                disableMetaEdit();
                setFocus('over');
            }
        } else {
            if (data[currentFocus].length < 3) {
                data[currentFocus] += num;
            }
            if (data[currentFocus].length === 3) {
                if (currentFocus === 'over') setFocus('under');
                else if (currentFocus === 'under') calcular();
            }
        }
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('val-over').innerText = formatOdd(data.over);
        document.getElementById('val-under').innerText = formatOdd(data.under);
        document.getElementById('val-meta').innerText = data.meta || "--";
    }

    function formatOdd(val) {
        if (val.length === 3) return val[0] + "." + val.substring(1,3);
        return val || "---";
    }

    function calcular() {
        if (data.over.length < 3 || data.under.length < 3) return;

        let o = parseFloat(formatOdd(data.over));
        let u = parseFloat(formatOdd(data.under));
        let m = parseFloat(data.meta);

        let pO = 100/o;
        let pU = 100/u;
        let real = (pO / (pO + pU)) * 100;

        document.getElementById('prob-real').innerText = real.toFixed(2) + "%";
        
        let stMsg = document.getElementById('st-msg');
        let stDesc = document.getElementById('st-desc');
        let box = document.getElementById('status-box');

        if (real >= 74) {
            stMsg.innerText = "1.5 OVER GOL NA PARTIDA";
            stMsg.style.color = "#00ff88";
        } else if (real >= 64) {
            stMsg.innerText = "0.5 OVER GOL NA PARTIDA";
            stMsg.style.color = "#00ff88";
        } else {
            stMsg.innerText = "5.5 UNDER GOL NA PARTIDA";
            stMsg.style.color = "#ff3333";
        }

        if (real >= m) {
            stDesc.innerText = "VALOR ENCONTRADO!";
            box.style.borderColor = "#00ff88";
        } else {
            stDesc.innerText = "SEM VALOR X ABAIXO DO MÍNIMO";
            box.style.borderColor = "#ff3333";
        }
    }

    function limpar() {
        if (isEditingMeta) {
            data.meta = '';
            updateDisplay();
        } else {
            data.over = '';
            data.under = '';
            document.getElementById('prob-real').innerText = "0.00%";
            document.getElementById('st-msg').innerText = "AGUARDANDO DADOS";
            document.getElementById('st-desc').innerText = "Insira as odds para analisar";
            document.getElementById('status-box').style.borderColor = "#3d0505";
            setFocus('over');
            updateDisplay();
        }
    }

    function adicionar() {
        if (!data.over || !data.under) return alert("Preencha os dados primeiro!");
        
        const fOver = formatOdd(data.over);
        const fUnder = formatOdd(data.under);
        
        let registro = {
            over: fOver,
            under: fUnder,
            mercado: document.getElementById('st-msg').innerText,
            resultado: 'Aguardando'
        };
        
        let indexExistente = historico.findIndex(item => item.over === fOver && item.under === fUnder);
        
        if (indexExistente !== -1) {
            historico.splice(indexExistente, 0, registro);
        } else {
            historico.unshift(registro);
        }
        
        salvarHistorico();
        alert("Adicionado e organizado no histórico!");
    }

    function toggleHistorico(show) {
        let modal = document.getElementById('modal-historico');
        modal.style.display = show ? 'block' : 'none';
        
        if (show) {
            let lista = document.getElementById('lista-historico');
            lista.innerHTML = "";
            historico.forEach((item, index) => {
                let corBorda = item.resultado === 'GREEN' ? '#008800' : (item.resultado === 'RED' ? '#880000' : '#ffcc00');
                lista.innerHTML += `
                    <div class="hist-item" style="border-left: 5px solid ${corBorda}">
                        <div>
                            <b>O: ${item.over} | U: ${item.under}</b><br>
                            ${item.mercado}<br>
                            <small>Resultado: ${item.resultado}</small>
                        </div>
                        <div>
                            <button class="btn-green" onclick="marcar(${index}, 'GREEN')">G</button>
                            <button class="btn-red" onclick="marcar(${index}, 'RED')">R</button>
                        </div>
                    </div>
                `;
            });
        }
    }

    function marcar(idx, res) {
        historico[idx].resultado = res;
        salvarHistorico();
        toggleHistorico(true);
    }

    // NOVA FUNÇÃO DE ESTATÍSTICAS
    function gerarEstatisticas() {
        if (historico.length === 0) return alert("Histórico vazio!");

        const grupos = {};
        
        // Agrupa por combinação de odds
        historico.forEach(item => {
            const chave = `O: ${item.over} | U: ${item.under}`;
            if (!grupos[chave]) {
                grupos[chave] = { total: 0, green: 0, red: 0 };
            }
            grupos[chave].total++;
            if (item.resultado === 'GREEN') grupos[chave].green++;
            if (item.resultado === 'RED') grupos[chave].red++;
        });

        const listaStats = document.getElementById('lista-stats');
        listaStats.innerHTML = "";

        // Cria os cards de cada odd
        for (const odd in grupos) {
            const g = grupos[odd];
            const percGreen = ((g.green / g.total) * 100).toFixed(1);
            const percRed = ((g.red / g.total) * 100).toFixed(1);

            listaStats.innerHTML += `
                <div class="stats-card">
                    <div class="stats-header">${odd}</div>
                    <div class="stats-row">
                        <span>Frequência no Histórico:</span>
                        <span><b>${g.total} vez(es)</b></span>
                    </div>
                    <div class="stats-row">
                        <span>Taxa de Green:</span>
                        <span class="perc-green">${percGreen}% (${g.green})</span>
                    </div>
                    <div class="stats-row">
                        <span>Taxa de Red:</span>
                        <span class="perc-red">${percRed}% (${g.red})</span>
                    </div>
                </div>
            `;
        }

        document.getElementById('modal-stats').style.display = 'block';
    }
</script>

</body>
</html>
